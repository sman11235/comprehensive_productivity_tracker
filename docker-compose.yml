services:
  postgres:
    image: postgis/postgis:18-3.6
    container_name: pf-postgres
    restart: always
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
      - POSTGRES_DB=personal_foundry
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d
    networks:
      - pf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d personal_foundry"]
      interval: 5s
      timeout: 5s
      retries: 20
  pg-admin:
    image: dpage/pgadmin4
    container_name: pf-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - ./postgres-init/servers.json:/pgadmin4/servers.json
    networks:
      - pf-network
  
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: pf-zookeeper
    environment:
      - ZOOKEEPER_CLIENT_PORT=2181
      - ZOOKEEPER_TICK_TIME=2000
    networks:
      - pf-network
  
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pf-kafka
    depends_on:
      - zookeeper
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:29092,PLAINTEXT_HOST://0.0.0.0:9092
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
    ports:
      - "9092:9092"
    networks:
      - pf-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: qs-kafka-ui
    ports:
      - "8080:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pf-network

  spring-consumer:
    build: ./spring-consumer
    container_name: pf-spring-consumer
    restart: on-failure
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/personal_foundry
      - SPRING_DATASOURCE_USERNAME=user
      - SPRING_DATASOURCE_PASSWORD=pass
      - SPRING_DATASOURCE_DRIVER_CLASS_NAME=org.postgresql.Driver
      - SPRING_JPA_HIBERNATE_DDL_AUTO=validate
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - SPRING_KAFKA_CONSUMER_AUTO_OFFSET_RESET=earliest
      - SPRING_KAFKA_CONSUMER_GROUP_ID=pf-spring-consumer
    networks:
      - pf-network

  python-auth-api:
    build:
      context: .
      dockerfile: python-producers/Dockerfile
    container_name: pf-python-auth-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUN_MODE=api
      - AUTH_API_HOST=0.0.0.0
      - AUTH_API_PORT=8000
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    ports:
      - "8000:8000"
    volumes:
      - ./python-producers/.state:/app/python-producers/.state
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pf-network

  python-github-poller:
    build:
      context: .
      dockerfile: python-producers/Dockerfile
    container_name: pf-python-github-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUN_MODE=loop
      - PRODUCER_SCRIPT=github_dev_producer.py
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./python-producers/.state:/app/python-producers/.state
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pf-network

  python-plaid-poller:
    build:
      context: .
      dockerfile: python-producers/Dockerfile
    container_name: pf-python-plaid-poller
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUN_MODE=loop
      - PRODUCER_SCRIPT=plaid_transaction_producer.py
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    volumes:
      - ./python-producers/.state:/app/python-producers/.state
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pf-network

  python-location-api:
    build:
      context: .
      dockerfile: python-producers/Dockerfile
    container_name: pf-python-location-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - RUN_MODE=api
      - API_SCRIPT=location_api.py
      - LOCATION_API_HOST=0.0.0.0
      - LOCATION_API_PORT=8001
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=personal_foundry
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=pass
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - pf-network

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: pf-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - python-location-api
    networks:
      - pf-network
  
networks:
  pf-network:
    driver: bridge

volumes:
  postgres-data:
